<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Magic Balls</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* Nền navy ngay từ đầu để KHÔNG bao giờ thấy màn hình đen/trắng trước khi app vẽ */
    html, body { background: #14225e; }
    html, body, #root {
      width: 100%;
      height: 100%;
      position: fixed;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: none;
      -webkit-user-select: none;
      user-select: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    /* ── Boot splash: hiện NGAY khi WebView load HTML (trước khi bundle JS chạy) → hết màn hình đen ── */
    #boot-splash {
      position: fixed; inset: 0; z-index: 100000;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 50% 22%, #2a47a8, #14225e 82%);
      transition: opacity .4s ease;
    }
    #boot-splash .credit {
      color: #ffffff;
      font-weight: 800;
      font-size: clamp(22px, 7vw, 40px);
      letter-spacing: 3px;
      text-align: center;
      text-shadow: 0 2px 10px rgba(0,0,0,.45);
      font-family: 'ui-rounded','SF Pro Rounded','Arial Rounded MT Bold','Quicksand',system-ui,sans-serif;
      animation: bootBob 3s ease-in-out infinite;
    }
    #boot-splash.boot-hide { opacity: 0; pointer-events: none; }
    @keyframes bootBob {
      0%,100% { transform: translateY(0) scale(1); }
      50%     { transform: translateY(-6px) scale(1.02); }
    }
  </style>
</head>
<body>
  <div id="boot-splash"></div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
